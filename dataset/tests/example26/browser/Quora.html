}

  background: white;
  padding: 2rem;

  text-align: center;
}
.retry-btn {

  border: none;

  cursor: pointer;

false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"\\\", \\\"modifiers\\\": {\\\"embed\\\": {\\\"url\\\": \\\"https://agingwithanattitude.quora.com/What-can-a-person-over-90-do-for-fun-13?comment_id=426897725&comment_type=2\\\", \\\"title\\\": \\\"https://agingwithanattitude.quora.com/What-can-a-person-over-90-do-for-fun-13?comment_id=426897725&comment_type=2\\\", \\\"snippet\\\": \\\"\\\", \\\"image_url\\\": \\\"https://qph.cf2.quoracdn.net/main-qimg-bb9953e64c075c2247bc73d533bbd7b9\\\", \\\"type\\\": \\\"quora\\\", \\\"quora_content_type\\\": 4, \\\"quora_oid\\\": 1477743807991156}}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"hyperlink_embed\\\", \\\"is_rtl\\\": false}]}\",\"contentEmbedSection\":{\"content\":{\"__typename\":\"Answer\",\"oid\":1477743807991156,\"contentType\":\"answer\",\"aid\":1477743807991156,\"isDeleted\":false,\"content\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"My mother is 89. Two years ago, she moved in with me. Each morning I hear her getting up at around 7:30 AM. She then baby talks to and feeds the 23 year old cat. Afterward, she makes herself breakfast and sits in the sunroom drinking coffee until she comes to her senses. Then she pushes her dust mop across the floors ( 2600 sq feet. ) for exercise. She will then cook if she feels like it, clean the kitchen, and do some calisthenics. In the afternoon, she does her beauty routine, which varies. Occasionally, she sifts through her megalithic, expensive and expansive wardrobe and either gifts me with stuff, donates, or sells them on the Real Real. I tell often her, \\\\u2018 Mom, you could have invested this money, and be living in a luxury home now.\\\\u2019 \\\\u2018 Eh,\\\\u2019 she replies. \\\\u2018 I love my clothes. Plus one day, all this will be yours because your sister has no taste.\\\\u2019\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"For fun, we take 3 mile walks by the lake about 5 times per week. She meets up with her girlfriends about once a month to party. She reads a lot and is working her way through my library. She daily speaks with her 91 year old sister who lives in San Diego and visits twice a year. (My aunt still works as an accountant for a private client).\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Aside from the cat, her greatest joy is her tablet, which I gave her last Christmas. She loves to read all about her favorite authors and composers, listen to the non mainstream news, watch various ballets, operas etc. At midnight, I hear her saying something like- \\\\u2018 I should really go to sleep now but someone put Pavarotti in my YouTube! \\\\u2018\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"She and her sister won the genetic lottery. Photo is from 2 years ago. This is how she dressed to go on an airplane. \\\\u2018 I look horrible! \\\\u2018 she says. I try to emphasize the positive. \\\\u2018 Mom, most people are dead at your age.\\\\u201d\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"\\\", \\\"modifiers\\\": {\\\"image\\\": \\\"https://qph.cf2.quoracdn.net/main-qimg-bb9953e64c075c2247bc73d533bbd7b9\\\", \\\"height\\\": 1920, \\\"width\\\": 920, \\\"master_url\\\": \\\"https://qph.cf2.quoracdn.net/main-qimg-b6e0d1a5f03b7e6cf7dce80e228501f6\\\", \\\"is_deleted\\\": false, \\\"is_sensitive\\\": false, \\\"is_uploaded_by_bot\\\": false, \\\"zoomable\\\": true, \\\"dominant_color\\\": \\\"#181f16\\\"}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"image\\\", \\\"is_rtl\\\": 5,\"id\":\"UXVlc3Rpb25AMDoxNzYwMjA1\",\"viewerHasMuted\":false,\"isDeleted\":false,\"__typename\":\"Question\",\"viewerHasDownvoted\":false,\"__isReportable\":\"Question\",\"reportableId\":1760205,\"canViewerReport\":true,\"network\":{\"appealsFormUrl\":\"https://help.quora.com/hc/en/requests/new?ticket_form_id=198746\",\"id\":\"TmV0d29yazow\",\"nid\":0},\"viewerCanReviewAnswers\":false,\"viewerCanEdit\":false,\"isLocked\":false,\"title\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"What is the most disappointing physics experiment in history?\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}]}\",\"isPartnerQuestion\":false,\"isTrendyQuestion\":false,\"isFollowUpQuestion\":false,\"asker\":{\"id\":\"VXNlckAwOjQ0MTAxODI=\",\"__typename\":\"User\",\"isEmployee\":false,\"uid\":4410182},\"url\":\"/What-is-the-most-disappointing-physics-experiment-in-history\",\"slug\":\"What-is-the-most-disappointing-physics-experiment-in-history\",\"tribeItem\":null,\"answerCount\":14,\"suggestedReplies\":[\"What were some other significant consequences of the Michelson-Morley experiment in physics?\",\"How did Einstein's theory of special relativity change our understanding of space and time?\",\"Can you explain how the interferometer works in the context of the experiment?\"]},\"__isReportable\":\"Answer\",\"id\":\"QW5zd2VyQDA6ODc1Njk0NDk=\",\"__typename\":\"Answer\",\"reportableId\":87569449,\"canViewerReport\":true,\"network\":{\"appealsFormUrl\":\"https://help.quora.com/hc/en/requests/new?ticket_form_id=198746\",\"id\":\"TmV0d29yazow\",\"__typename\":\"Network\",\"contentLanguageCode\":\"en\",\"englishName\":\"English\"},\"__isVotable\":\"Answer\",\"oid\":87569449,\"contentType\":\"answer\",\"numUpvotes\":26830,\"isDeleted\":false,\"viewerCanRestoreAnswer\":false,\"aid\":87569449,\"viewerHasReported\":false,\"viewerHasAccess\":true,\"viewerIsAuthor\":false,\"content\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"In 1927 Professor Thomas Parnell of the University of Queensland\\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\" \\\", \\\"modifiers\\\": {\\\"bold\\\": true}}, {\\\"text\\\": \\\"started what is known as the longest continuous laboratory experiment in history.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"The pitch drop experiment.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"\\\", \\\"modifiers\\\": {\\\"image\\\": \\\"https://qph.cf2.quoracdn.net/main-qimg-2f802eac11d5c7151607d6c8c6613fe7-pjlq\\\", \\\"height\\\": 268, \\\"width\\\": 181, \\\"master_url\\\": \\\"https://qph.cf2.quoracdn.net/main-qimg-2f802eac11d5c7151607d6c8c6613fe7-pjlq\\\", \\\"is_deleted\\\": false, \\\"is_sensitive\\\": false, \\\"is_uploaded_by_bot\\\": false, \\\"dominant_color\\\": \\\"#f7f6f5\\\"}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"image\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"He wanted to prove to his students that bitumen, although it has the appearance of a solid, is, in fact, a highly viscous liquid. So he filled a funnel with some hot asphalt and waited 3 years to let it stabilize and subsequently opened the funnel.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"And he waited and waited\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"And waited.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Very, very slowly a drop was forming\\\\u2026\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"And waited.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"After waiting \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"for more than 8 years\\\", \\\"modifiers\\\": {\\\"bold\\\": true}}, {\\\"text\\\": \\\" the first drop fell.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Unfortunately, nobody saw it, so the professor waited for the second drop.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"And waited.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"When the prof died in 1948 the second drop was completed, but he never saw a drop fall. His successor, Professor John Mainstone, was determined to be the first person that actually would see a drop fall.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"With the emergence of new technology, he installed a webcam to make sure the event was recorded, but due to an unfortunate power failure, the camera did not record the occurrence when, in November 2000, the eighth drop fell.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Prof Mainstone died in 2013.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Needless to say that the next prof, Andrew White, was even more determined to see, or at least record, the next drop. A time-lapse camera was set up, with continuous video of the four most recent days, and two additional video cameras. Nothing was left to a chance.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"On 17 April 2014, the 9th drop was about to fall: The drop touched the previous drops that were still in the beaker below the experiment, but it was still attached to the funnel. The previous drops were supporting the drop and it wasn't gonna fall.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Prof White decided to put an empty beaker below the experiment to make room for the drop. He carefully lifted the bell jar that protected the experiment. But he didn't know that there was a degraded seal between the glass bell jar and the wooden platform below the experiment. The wooden base wobbled and disaster struck: the 9th drop came loose.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"We are now 2018, more than 90 years after the start of the experiment and nobody ever witnessed or recorded a drop.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"It really must be the most unfortunate experiment in history.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}]}\",\"viewHash\":\"a-87569449_b585e782ea7996b30b74d1a5aee628bd\",\"isMachineAnswer\":false,\"isSelectedForFeedSurvey\":false,\"isSelectedForDigestClickthroughSurvey\":false,\"su             e.preventDefault();
            e.stopPropagation();
            
            var val = searchInput.value.trim();
            if (val) {
                // 拼接 URL 并跳转
                var targetUrl = SEARCH_CONFIG.baseUrl + encodeURIComponent(val);
                window.location.href = targetUrl;
            }
        }
    }
    
    // 确保 DOM 加载完毕后执行
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupSearchRedirect);
    } else {
        setupSearchRedirect();
    }
})();
</script>
</body></html>
