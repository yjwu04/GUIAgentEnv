<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube</title>
  <style>
    /* Make the iframe fill the viewport */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #contentFrame {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
  <script>
    // After 5 seconds, navigate the iframe to the Chinese version
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('contentFrame').src = './YouTube-Arabic.html';
      }, 1000);
    });
  </script>
</head>
<body>
  <!-- initially shows English page -->
  <iframe
    id="contentFrame"
    src="./YouTube-EN.html"
    title="YouTube English"
  ></iframe>
</body>
</html>
